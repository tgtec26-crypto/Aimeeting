<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 인구 피라미드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1c2538;
    --male: #3b82f6;
    --male-light: #93c5fd;
    --female: #f472b6;
    --female-light: #fbcfe8;
    --accent: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --border: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 그리드 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* 헤더 */
  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* 연도 디스플레이 */
  .year-display {
    text-align: center;
    margin-bottom: 8px;
  }

  .year-number {
    font-family: 'DM Mono', monospace;
    font-size: clamp(52px, 12vw, 88px);
    font-weight: 500;
    color: #fff;
    line-height: 1;
    letter-spacing: -3px;
    text-shadow: 0 0 60px rgba(59,130,246,0.4);
    transition: color 0.3s;
  }

  .year-number.future {
    color: var(--accent);
    text-shadow: 0 0 60px rgba(245,158,11,0.4);
  }

  .year-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 4px;
    background: rgba(245,158,11,0.15);
    color: var(--accent);
    border: 1px solid rgba(245,158,11,0.3);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .year-tag.visible { opacity: 1; }

  /* 슬라이더 섹션 */
  .slider-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }

  .slider-wrapper {
    position: relative;
    margin-bottom: 16px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
    background: linear-gradient(to right, var(--male) var(--pct, 0%), var(--border) var(--pct, 0%));
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--male);
    box-shadow: 0 0 12px rgba(59,130,246,0.5);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    box-shadow: 0 0 20px rgba(59,130,246,0.7);
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* 버튼들 */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { background: var(--border); border-color: var(--text-muted); }

  .btn.primary {
    background: var(--male);
    border-color: var(--male);
    color: #fff;
  }

  .btn.primary:hover { background: #2563eb; }

  .btn.active {
    background: #dc2626;
    border-color: #dc2626;
    color: #fff;
  }

  .speed-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  /* 통계 카드 */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: border-color 0.3s;
  }

  .stat-card:hover { border-color: var(--text-muted); }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 300;
  }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 2.5vw, 18px);
    font-weight: 500;
    color: #fff;
  }

  .stat-value span {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* 피라미드 */
  .pyramid-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .pyramid-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .legend {
    display: flex;
    gap: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .scale-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* 피라미드 그리드 */
  .pyramid-grid {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .age-row {
    display: grid;
    grid-template-columns: 1fr 52px 1fr;
    gap: 4px;
    align-items: center;
    height: 22px;
  }

  .bar-cell {
    display: flex;
    align-items: center;
    height: 100%;
    position: relative;
  }

  .bar-left { justify-content: flex-end; }
  .bar-right { justify-content: flex-start; }

  .bar {
    height: 16px;
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    min-width: 2px;
  }

  .bar-left .bar {
    background: linear-gradient(to left, var(--male), rgba(59,130,246,0.6));
  }

  .bar-right .bar {
    background: linear-gradient(to right, var(--female), rgba(244,114,182,0.6));
  }

  .bar:hover { filter: brightness(1.3); }

  /* 툴팁 */
  .bar-tooltip {
    position: absolute;
    background: #1e293b;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #fff;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    bottom: calc(100% + 4px);
  }

  .bar-left .bar-tooltip { right: 0; }
  .bar-right .bar-tooltip { left: 0; }
  .bar:hover .bar-tooltip { opacity: 1; }

  .age-label {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    white-space: nowrap;
    line-height: 1;
  }

  /* X축 */
  .x-axis {
    display: grid;
    grid-template-columns: 1fr 52px 1fr;
    gap: 4px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .x-axis-side {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }

  .x-axis-left { flex-direction: row-reverse; }

  /* 주요 이벤트 배너 */
  .event-banner {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 38px;
    transition: opacity 0.3s;
  }

  .event-banner.hidden { opacity: 0; }

  .event-icon { font-size: 16px; flex-shrink: 0; }

  /* 반응형 */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stats-row .stat-card:last-child { grid-column: span 2; }
    .age-row { height: 18px; }
    .bar { height: 12px; }
    .age-label { font-size: 9px; }
    .age-row { grid-template-columns: 1fr 40px 1fr; }
  }

  /* 로딩 애니메이션 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .container > * {
    animation: fadeInUp 0.4s ease both;
  }

  .container > *:nth-child(1) { animation-delay: 0.05s; }
  .container > *:nth-child(2) { animation-delay: 0.1s; }
  .container > *:nth-child(3) { animation-delay: 0.15s; }
  .container > *:nth-child(4) { animation-delay: 0.2s; }
  .container > *:nth-child(5) { animation-delay: 0.25s; }

  .source {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 20px;
    font-weight: 300;
  }

  .source a { color: var(--text-muted); text-decoration: underline; }
</style>
</head>

<div class="container">

  <div class="event-banner hidden" id="eventBanner">

  <div class="stats-row">

  <div class="pyramid-container">

        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--female)"></div>
          여성
        </div>
      </div>
      <div class="scale-label" id="scaleLabel">← 인구 (천 명) →</div>
    </div>
    <div class="pyramid-grid" id="pyramidGrid"></div>
    <div class="x-axis" id="xAxis"></div>
  </div>

  <div class="source">
    출처: UN World Population Prospects 2024 (대한민국, Republic of Korea) · 2026년 이후는 중간 추계 시나리오 기준
  </div>
</div>

// 슬라이더 → 연도 매핑
const yearSlider = document.getElementById('yearSlider');
const yearDisplay = document.getElementById('yearDisplay');
const yearTag = document.getElementById('yearTag');
const eventBanner = document.getElementById('eventBanner');
const eventText = document.getElementById('eventText');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const speedBtn = document.getElementById('speedBtn');
const speedLabel = document.getElementById('speedLabel');

let currentIdx = 15; // 2024
let playing = false;
let playInterval = null;
let speed = 'normal'; // slow, normal, fast
const SPEEDS = { slow: 1200, normal: 700, fast: 300 };
const SPEED_LABELS = { slow: '속도: 느림', normal: '속도: 보통', fast: '속도: 빠름' };
const SPEED_BTNS = { slow: '🐢 느리게', normal: '🐇 빠르게', fast: '⚡ 매우 빠름' };

function getYear(idx) { return YEARS[idx]; }

function calcStats(year) {
  const d = DATA[year];
  let totalM = 0, totalF = 0, elderly = 0;
  d.M.forEach((v, i) => { totalM += v; if (i >= 13) elderly += v; });
  d.F.forEach((v, i) => { totalF += v; if (i >= 13) elderly += v; });
  const total = totalM + totalF;
  return {
    total,
    totalM,
    totalF,
    elderlyPct: ((elderly / total) * 100).toFixed(1)
  };
}

function formatNum(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + '천만';
  return Math.round(n / 100) + '백만';
}

function renderStats(year) {
  const s = calcStats(year);
  document.getElementById('statTotal').textContent = Math.round(s.total / 100) / 10 + ' 백만 명';
  document.getElementById('statGender').innerHTML =
    `<span style="color:var(--male-light)">${Math.round(s.totalM/100)/10}M</span> / <span style="color:var(--female-light)">${Math.round(s.totalF/100)/10}M</span>`;
  document.getElementById('statElderly').textContent = s.elderlyPct + '%';
}

function renderPyramid(year) {
  const d = DATA[year];
  const maxVal = Math.max(...d.M, ...d.F);
  const scale = 100 / maxVal; // % 기준

  const grid = document.getElementById('pyramidGrid');
  grid.innerHTML = '';

  // 역순(고령→유년) 렌더링
  for (let i = AGE_GROUPS.length - 1; i >= 0; i--) {
    const mVal = d.M[i];
    const fVal = d.F[i];
    const mPct = mVal * scale;
    const fPct = fVal * scale;

    const row = document.createElement('div');
    row.className = 'age-row';
    row.innerHTML = `
      <div class="bar-cell bar-left">
        <div class="bar" style="width:${mPct}%">
          <div class="bar-tooltip">${(mVal).toLocaleString()}천명</div>
        </div>
      </div>
      <div class="age-label">${AGE_GROUPS[i]}</div>
      <div class="bar-cell bar-right">
        <div class="bar" style="width:${fPct}%">
          <div class="bar-tooltip">${(fVal).toLocaleString()}천명</div>
        </div>
      </div>
    `;
    grid.appendChild(row);
  }

  // X축
  const xAxis = document.getElementById('xAxis');
  const ticks = [Math.round(maxVal), Math.round(maxVal*0.67), Math.round(maxVal*0.33), 0];
  xAxis.innerHTML = `
    <div class="x-axis-side x-axis-left">
      ${ticks.map(t => `<span>${t.toLocaleString()}</span>`).join('')}
    </div>
    <div></div>
    <div class="x-axis-side">
      ${ticks.slice().reverse().map(t => `<span>${t.toLocaleString()}</span>`).join('')}
    </div>
  `;
}

function updateSliderColor(idx) {
  const pct = (idx / (YEARS.length - 1)) * 100;
  yearSlider.style.setProperty('--pct', pct + '%');
}

function update(idx) {
  currentIdx = Math.max(0, Math.min(YEARS.length - 1, idx));
  const year = YEARS[currentIdx];

  yearSlider.value = currentIdx;
  updateSliderColor(currentIdx);

  yearDisplay.textContent = year;
  const isFuture = year > 2024;
  yearDisplay.classList.toggle('future', isFuture);
  yearTag.classList.toggle('visible', isFuture);

  // 이벤트 배너
  if (EVENTS[year]) {
    eventText.textContent = EVENTS[year];
    eventBanner.classList.remove('hidden');
  } else {
    eventBanner.classList.add('hidden');
  }

  renderStats(year);
  renderPyramid(year);
}

// 슬라이더 이벤트
yearSlider.addEventListener('input', (e) => {
  update(parseInt(e.target.value));
});

prevBtn.addEventListener('click', () => update(currentIdx - 1));
nextBtn.addEventListener('click', () => update(currentIdx + 1));

playBtn.addEventListener('click', () => {
  if (playing) {
    clearInterval(playInterval);
    playing = false;
    playBtn.textContent = '▶ 재생';
    playBtn.classList.remove('active');
  } else {
    if (currentIdx >= YEARS.length - 1) update(0);
    playing = true;
    playBtn.textContent = '⏹ 정지';
    playBtn.classList.add('active');
    playInterval = setInterval(() => {
      if (currentIdx >= YEARS.length - 1) {
        clearInterval(playInterval);
        playing = false;
        playBtn.textContent = '▶ 재생';
        playBtn.classList.remove('active');
      } else {
        update(currentIdx + 1);
      }
    }, SPEEDS[speed]);
  }
});

speedBtn.addEventListener('click', () => {
  if (speed === 'slow') speed = 'normal';
  else if (speed === 'normal') speed = 'fast';
  else speed = 'slow';

  speedLabel.textContent = SPEED_LABELS[speed];
  speedBtn.textContent = SPEED_BTNS[speed];

  if (playing) {
    clearInterval(playInterval);
    playInterval = setInterval(() => {
      if (currentIdx >= YEARS.length - 1) {
        clearInterval(playInterval);
        playing = false;
        playBtn.textContent = '▶ 재생';
        playBtn.classList.remove('active');
      } else {
        update(currentIdx + 1);
      }
    }, SPEEDS[speed]);
  }
});

// 키보드
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') update(currentIdx - 1);
  if (e.key === 'ArrowRight') update(currentIdx + 1);
  if (e.key === ' ') { e.preventDefault(); playBtn.click(); }
});

// 초기화
update(15); // 2024
