<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한민국 인구 피라미드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --surface2: #1c2538;
  --male: #3b82f6; --male-light: #93c5fd;
  --female: #f472b6; --female-light: #fbcfe8;
  --accent: #f59e0b; --text: #e2e8f0; --text-muted: #64748b; --border: #1e293b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  height:100dvh; overflow:hidden;
  display:flex; flex-direction:column;
}
/* ── 상단 바 ── */
.top-bar {
  flex-shrink:0; background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:9px 14px;
  display:grid; grid-template-columns:auto 1fr auto;
  align-items:center; gap:14px;
}
.title-year { display:flex; align-items:baseline; gap:8px; white-space:nowrap; }
.page-title { font-size:12px; color:var(--text-muted); }
.year-number {
  font-family:'DM Mono',monospace; font-size:24px; font-weight:500;
  color:#fff; letter-spacing:-1px; line-height:1; transition:color .3s;
}
.year-number.future { color:var(--accent); }
.year-tag {
  font-family:'DM Mono',monospace; font-size:9px;
  padding:2px 6px; border-radius:20px;
  background:rgba(245,158,11,.15); color:var(--accent);
  border:1px solid rgba(245,158,11,.3);
  opacity:0; transition:opacity .3s;
}
.year-tag.visible { opacity:1; }
.slider-wrap { display:flex; flex-direction:column; gap:3px; min-width:0; }
input[type="range"] {
  -webkit-appearance:none; width:100%; height:5px; border-radius:3px;
  outline:none; cursor:pointer;
  background:linear-gradient(to right, var(--male) var(--pct,0%), var(--border) var(--pct,0%));
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  background:#fff; border:3px solid var(--male);
  box-shadow:0 0 8px rgba(59,130,246,.5); cursor:pointer; transition:transform .15s;
}
input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.2); }
.slider-labels {
  display:flex; justify-content:space-between;
  font-family:'DM Mono',monospace; font-size:9px; color:var(--text-muted);
}
.btn-group { display:flex; gap:5px; align-items:center; flex-shrink:0; }
.btn {
  font-size:12px; font-weight:500; padding:5px 11px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface2); color:var(--text);
  cursor:pointer; transition:all .15s; white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
}
.btn:hover { background:var(--border); }
.btn.primary { background:var(--male); border-color:var(--male); color:#fff; }
.btn.primary:hover { background:#2563eb; }
.btn.active   { background:#dc2626; border-color:#dc2626; color:#fff; }
/* ── 이벤트 배너 ── */
.event-banner {
  flex-shrink:0; background:rgba(245,158,11,.07);
  border-bottom:1px solid rgba(245,158,11,.18);
  padding:4px 14px; font-size:11px; color:var(--accent);
  display:flex; align-items:center; gap:6px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-height:26px; transition:max-height .3s, padding .3s, opacity .3s;
}
.event-banner.hidden { max-height:0; padding-top:0; padding-bottom:0; opacity:0; }
/* ── 통계 줄 ── */
.stats-bar { flex-shrink:0; display:flex; border-bottom:1px solid var(--border); }
.stat-item {
  flex:1; padding:4px 12px; border-right:1px solid var(--border);
  display:flex; align-items:baseline; gap:6px;
}
.stat-item:last-child { border-right:none; }
.stat-label { font-size:10px; color:var(--text-muted); white-space:nowrap; }
.stat-value { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:#fff; }
/* ── 피라미드 ── */
.pyramid-wrap {
  flex:1; min-height:0;
  padding:6px 12px 4px;
  display:flex; flex-direction:column;
}
.legend {
  display:flex; justify-content:center; gap:18px;
  margin-bottom:4px; flex-shrink:0;
}
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-muted); }
.legend-dot { width:8px; height:8px; border-radius:2px; }
.pyramid-grid { flex:1; min-height:0; display:flex; flex-direction:column; gap:1px; }
.age-row {
  flex:1; min-height:0;
  display:grid; grid-template-columns:1fr 40px 1fr;
  gap:3px; align-items:center;
}
.bar-cell { display:flex; align-items:center; height:100%; position:relative; }
.bar-left  { justify-content:flex-end; }
.bar-right { justify-content:flex-start; }
.bar {
  height:65%; min-height:3px; border-radius:2px; min-width:2px;
  transition:width .45s cubic-bezier(.4,0,.2,1); position:relative;
}
.bar-left  .bar { background:linear-gradient(to left,  var(--male),   rgba(59,130,246,.5)); }
.bar-right .bar { background:linear-gradient(to right, var(--female), rgba(244,114,182,.5)); }
.bar:hover { filter:brightness(1.3); }
.bar-tooltip {
  position:absolute; background:#1e293b; border:1px solid var(--border);
  border-radius:5px; padding:3px 7px;
  font-family:'DM Mono',monospace; font-size:10px; color:#fff;
  white-space:nowrap; z-index:20; pointer-events:none;
  opacity:0; transition:opacity .15s; bottom:calc(100% + 3px);
}
.bar-left  .bar-tooltip { right:0; }
.bar-right .bar-tooltip { left:0; }
.bar:hover .bar-tooltip { opacity:1; }
.age-label {
  text-align:center; font-family:'DM Mono',monospace;
  font-size:9px; color:var(--text-muted); white-space:nowrap;
}
.x-axis {
  flex-shrink:0; display:grid; grid-template-columns:1fr 40px 1fr;
  gap:3px; padding-top:3px; border-top:1px solid var(--border); margin-top:2px;
}
.x-axis-side {
  display:flex; justify-content:space-between;
  font-family:'DM Mono',monospace; font-size:9px; color:var(--text-muted);
}
.x-axis-left { flex-direction:row-reverse; }
.source {
  flex-shrink:0; text-align:center;
  font-size:10px; color:var(--border); padding:3px 0;
}
@media (max-width:600px) {
  .top-bar { grid-template-columns:1fr; gap:7px; }
  .age-label { font-size:8px; }
}
</style>
</head>

<div class="top-bar">
  <div class="title-year">

    <button class="btn" id="nextBtn">▶</button>

</div>

<div class="event-banner hidden" id="eventBanner">

</div>

<div class="stats-bar">

  </div>
  <div class="stat-item">

  </div>
  <div class="stat-item">
    <span class="stat-label">65세 이상</span>

  </div>
</div>

<div class="pyramid-wrap">

  </div>
  <div class="pyramid-grid" id="pyramidGrid"></div>
  <div class="x-axis" id="xAxis"></div>
</div>

  2100:'예측: 인구 2,500만~3,000만 명 수준.'
};

const yearSlider=document.getElementById('yearSlider');
const yearDisplay=document.getElementById('yearDisplay');
const yearTag=document.getElementById('yearTag');
const eventBanner=document.getElementById('eventBanner');
const eventText=document.getElementById('eventText');
const playBtn=document.getElementById('playBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const speedBtn=document.getElementById('speedBtn');

let currentIdx=15, playing=false, playInterval=null, speed='normal';
const SPEEDS={slow:1200,normal:700,fast:300};
const SPEED_ICONS={slow:'🐢',normal:'🐇',fast:'⚡'};

function calcStats(year){
  const d=DATA[year]; let tM=0,tF=0,el=0;
  d.M.forEach((v,i)=>{tM+=v; if(i>=13)el+=v;});
  d.F.forEach((v,i)=>{tF+=v; if(i>=13)el+=v;});
  const tot=tM+tF;
  return{total:tot,totalM:tM,totalF:tF,elderlyPct:((el/tot)*100).toFixed(1)};
}

function renderStats(year){
  const s=calcStats(year);
  document.getElementById('statTotal').textContent=(Math.round(s.total/100)/10)+' 백만';
  document.getElementById('statGender').innerHTML=
    `<span style="color:var(--male-light)">${Math.round(s.totalM/100)/10}M</span>`+
    ` / <span style="color:var(--female-light)">${Math.round(s.totalF/100)/10}M</span>`;
  document.getElementById('statElderly').textContent=s.elderlyPct+'%';
}

function renderPyramid(year){
  const d=DATA[year];
  const maxVal=Math.max(...d.M,...d.F);
  const scale=100/maxVal;
  const grid=document.getElementById('pyramidGrid');
  grid.innerHTML='';
  for(let i=AGE_GROUPS.length-1;i>=0;i--){
    const mPct=d.M[i]*scale, fPct=d.F[i]*scale;
    const row=document.createElement('div');
    row.className='age-row';
    row.innerHTML=`
      <div class="bar-cell bar-left">
        <div class="bar" style="width:${mPct}%">
          <div class="bar-tooltip">${d.M[i].toLocaleString()}천명</div>
        </div>
      </div>
      <div class="age-label">${AGE_GROUPS[i]}</div>
      <div class="bar-cell bar-right">
        <div class="bar" style="width:${fPct}%">
          <div class="bar-tooltip">${d.F[i].toLocaleString()}천명</div>
        </div>
      </div>`;
    grid.appendChild(row);
  }
  const ticks=[Math.round(maxVal),Math.round(maxVal*.67),Math.round(maxVal*.33),0];
  document.getElementById('xAxis').innerHTML=`
    <div class="x-axis-side x-axis-left">${ticks.map(t=>`<span>${t.toLocaleString()}</span>`).join('')}</div>
    <div></div>
    <div class="x-axis-side">${ticks.slice().reverse().map(t=>`<span>${t.toLocaleString()}</span>`).join('')}</div>`;
}

function update(idx){
  currentIdx=Math.max(0,Math.min(YEARS.length-1,idx));
  const year=YEARS[currentIdx];
  yearSlider.value=currentIdx;
  const pct=(currentIdx/(YEARS.length-1))*100;
  yearSlider.style.setProperty('--pct',pct+'%');
  yearDisplay.textContent=year;
  const isFuture=year>2025;
  yearDisplay.classList.toggle('future',isFuture);
  yearTag.classList.toggle('visible',isFuture);
  if(EVENTS[year]){eventText.textContent=EVENTS[year];eventBanner.classList.remove('hidden');}
  else{eventBanner.classList.add('hidden');}
  renderStats(year);
  renderPyramid(year);
}

yearSlider.addEventListener('input',e=>update(parseInt(e.target.value)));
prevBtn.addEventListener('click',()=>update(currentIdx-1));
nextBtn.addEventListener('click',()=>update(currentIdx+1));

playBtn.addEventListener('click',()=>{
  if(playing){
    clearInterval(playInterval); playing=false;
    playBtn.textContent='▶ 재생'; playBtn.classList.remove('active');
  } else {
    if(currentIdx>=YEARS.length-1)update(0);
    playing=true; playBtn.textContent='⏹ 정지'; playBtn.classList.add('active');
    playInterval=setInterval(()=>{
      if(currentIdx>=YEARS.length-1){
        clearInterval(playInterval); playing=false;
        playBtn.textContent='▶ 재생'; playBtn.classList.remove('active');
      } else update(currentIdx+1);
    },SPEEDS[speed]);
  }
});

speedBtn.addEventListener('click',()=>{
  speed=speed==='slow'?'normal':speed==='normal'?'fast':'slow';
  speedBtn.textContent=SPEED_ICONS[speed];
  if(playing){
    clearInterval(playInterval);
    playInterval=setInterval(()=>{
      if(currentIdx>=YEARS.length-1){
        clearInterval(playInterval);playing=false;
        playBtn.textContent='▶ 재생';playBtn.classList.remove('active');
      } else update(currentIdx+1);
    },SPEEDS[speed]);
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')update(currentIdx-1);
  if(e.key==='ArrowRight')update(currentIdx+1);
  if(e.key===' '){e.preventDefault();playBtn.click();}
});

update(15);
</script>
</body>
</html>
