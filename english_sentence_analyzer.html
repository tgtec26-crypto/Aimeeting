<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Sentence Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --surface: #ffffff;
    --surface2: #f3ede3;
    --border: #e8e0d0;
    --text: #2c2416;
    --text-muted: #8a7d68;
    --text-light: #b5a898;

    /* 문장 성분 색상 - 따뜻하고 선명한 팔레트 */
    --s-bg: #dbeafe;   --s-border: #3b82f6;   --s-text: #1d4ed8;   /* Subject - 파랑 */
    --v-bg: #dcfce7;   --v-border: #22c55e;   --v-text: #15803d;   /* Verb - 초록 */
    --o-bg: #fef3c7;   --o-border: #f59e0b;   --o-text: #b45309;   /* Object - 황금 */
    --c-bg: #fce7f3;   --c-border: #ec4899;   --c-text: #be185d;   /* Complement - 핑크 */
    --a-bg: #f3e8ff;   --a-border: #a855f7;   --a-text: #7e22ce;   /* Adverbial - 보라 */
    --p-bg: #ffedd5;   --p-border: #f97316;   --p-text: #c2410c;   /* Phrase/Clause - 오렌지 */

    --radius: 10px;
    --shadow: 0 2px 12px rgba(44,36,22,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 36px 20px 60px;
  }

  /* 배경 질감 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4b49a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
  }

  /* 헤더 */
  header {
    margin-bottom: 32px;
  }

  .header-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  h1 em {
    font-style: italic;
    color: var(--s-text);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* 범례 */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .legend-chip {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    border: 1.5px solid;
    white-space: nowrap;
  }

  .legend-chip.S { background: var(--s-bg); border-color: var(--s-border); color: var(--s-text); }
  .legend-chip.V { background: var(--v-bg); border-color: var(--v-border); color: var(--v-text); }
  .legend-chip.O { background: var(--o-bg); border-color: var(--o-border); color: var(--o-text); }
  .legend-chip.C { background: var(--c-bg); border-color: var(--c-border); color: var(--c-text); }
  .legend-chip.A { background: var(--a-bg); border-color: var(--a-border); color: var(--a-text); }
  .legend-chip.P { background: var(--p-bg); border-color: var(--p-border); color: var(--p-text); }

  /* 입력 영역 */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .input-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .input-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-light);
  }

  textarea {
    width: 100%;
    min-height: 110px;
    padding: 16px 18px;
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.7;
    color: var(--text);
    background: var(--surface);
    border: none;
    outline: none;
    resize: vertical;
    transition: background 0.2s;
  }

  textarea::placeholder {
    color: var(--text-light);
    font-style: italic;
  }

  textarea:focus { background: #fff; }

  /* 샘플 버튼 */
  .samples {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .samples-label {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    margin-right: 2px;
  }

  .sample-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .sample-btn:hover {
    background: var(--surface2);
    border-color: var(--text-muted);
    color: var(--text);
  }

  /* 분석 버튼 */
  .analyze-btn {
    width: 100%;
    padding: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    background: var(--text);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 14px rgba(44,36,22,0.2);
    letter-spacing: 0.3px;
  }

  .analyze-btn:hover:not(:disabled) {
    background: #1a0e05;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(44,36,22,0.3);
  }

  .analyze-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-icon { font-size: 18px; }

  /* 로딩 */
  .loading {
    display: none;
    text-align: center;
    padding: 48px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
  }

  .loading.visible { display: block; }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-10px); opacity: 1; }
  }

  .loading-text {
    font-family: 'Lora', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
  }

  /* 결과 영역 */
  .results {
    display: none;
  }

  .results.visible { display: block; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
    animation: slideIn 0.35s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(2) { animation-delay: 0.05s; }
  .result-card:nth-child(3) { animation-delay: 0.10s; }
  .result-card:nth-child(4) { animation-delay: 0.15s; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .sentence-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .sentence-pattern {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    font-weight: 500;
    background: var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* 태깅된 문장 */
  .tagged-sentence {
    padding: 20px 20px 16px;
    font-family: 'Lora', serif;
    font-size: 18px;
    line-height: 2.0;
    word-spacing: 2px;
  }

  .token {
    display: inline;
    position: relative;
  }

  .token-word {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 5px;
    border: 1.5px solid transparent;
    transition: filter 0.15s, transform 0.15s;
    cursor: default;
    margin: 1px 1px;
  }

  .token-word:hover {
    filter: brightness(0.92);
    transform: translateY(-1px);
  }

  .token-word.S { background: var(--s-bg); border-color: var(--s-border); color: var(--s-text); }
  .token-word.V { background: var(--v-bg); border-color: var(--v-border); color: var(--v-text); }
  .token-word.O { background: var(--o-bg); border-color: var(--o-border); color: var(--o-text); }
  .token-word.C { background: var(--c-bg); border-color: var(--c-border); color: var(--c-text); }
  .token-word.A { background: var(--a-bg); border-color: var(--a-border); color: var(--a-text); }
  .token-word.P { background: var(--p-bg); border-color: var(--p-border); color: var(--p-text); }
  .token-word.none { color: var(--text); }

  /* 성분 레이블 (위에 표시) */
  .token-label {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .token:hover .token-label { opacity: 1; }

  .token-label.S { color: var(--s-text); }
  .token-label.V { color: var(--v-text); }
  .token-label.O { color: var(--o-text); }
  .token-label.C { color: var(--c-text); }
  .token-label.A { color: var(--a-text); }
  .token-label.P { color: var(--p-text); }

  /* 성분 분석표 */
  .breakdown {
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .breakdown-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 10px 0 8px;
  }

  .breakdown-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .breakdown-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid;
  }

  .breakdown-item.S { background: var(--s-bg); border-color: var(--s-border); color: var(--s-text); }
  .breakdown-item.V { background: var(--v-bg); border-color: var(--v-border); color: var(--v-text); }
  .breakdown-item.O { background: var(--o-bg); border-color: var(--o-border); color: var(--o-text); }
  .breakdown-item.C { background: var(--c-bg); border-color: var(--c-border); color: var(--c-text); }
  .breakdown-item.A { background: var(--a-bg); border-color: var(--a-border); color: var(--a-text); }
  .breakdown-item.P { background: var(--p-bg); border-color: var(--p-border); color: var(--p-text); }

  .breakdown-role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    opacity: 0.8;
  }

  .breakdown-phrase {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-style: italic;
  }

  .breakdown-ko {
    font-size: 11px;
    opacity: 0.75;
  }

  /* 문형 설명 */
  .pattern-explanation {
    padding: 10px 20px 14px;
    border-top: 1px dashed var(--border);
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    font-family: 'Lora', serif;
  }

  /* 에러 */
  .error-box {
    display: none;
    padding: 16px 20px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius);
    color: #dc2626;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .error-box.visible { display: block; }

  /* 반응형 */
  @media (max-width: 580px) {
    .tagged-sentence { font-size: 15px; }
    .breakdown-grid { gap: 6px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-eyebrow">English Grammar · AI Analyzer</div>
    <h1>문장 <em>성분</em> 분석기</h1>
    <div class="subtitle">영어 문장을 붙여넣으면 AI가 문장 성분을 색상으로 태깅해드립니다</div>
  </header>

  <!-- 범례 -->
  <div class="legend">
    <div class="legend-item"><span class="legend-chip S">S</span> 주어 Subject</div>
    <div class="legend-item"><span class="legend-chip V">V</span> 동사 Verb</div>
    <div class="legend-item"><span class="legend-chip O">O</span> 목적어 Object</div>
    <div class="legend-item"><span class="legend-chip C">C</span> 보어 Complement</div>
    <div class="legend-item"><span class="legend-chip A">A</span> 부사어 Adverbial</div>
    <div class="legend-item"><span class="legend-chip P">P</span> 구/절 Phrase·Clause</div>
  </div>

  <!-- 입력 -->
  <div class="input-section">
    <div class="input-header">
      <span class="input-label">Input Sentence</span>
      <span class="char-count" id="charCount">0자</span>
    </div>
    <textarea id="inputText"
      placeholder="영어 문장을 입력하거나 붙여넣으세요. 여러 문장도 가능합니다.&#10;&#10;예) The quick brown fox jumps over the lazy dog."
      maxlength="2000"></textarea>
    <div class="samples">
      <span class="samples-label">예문:</span>
      <button class="sample-btn" onclick="setSample(0)">1형식</button>
      <button class="sample-btn" onclick="setSample(1)">2형식</button>
      <button class="sample-btn" onclick="setSample(2)">3형식</button>
      <button class="sample-btn" onclick="setSample(3)">4형식</button>
      <button class="sample-btn" onclick="setSample(4)">5형식</button>
      <button class="sample-btn" onclick="setSample(5)">복문</button>
      <button class="sample-btn" onclick="setSample(6)">관계절</button>
    </div>
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">
    <span class="btn-icon">🔍</span> 문장 성분 분석하기
  </button>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="loading-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="loading-text">AI가 문장 성분을 분석하는 중...</div>
  </div>

  <div class="results" id="results"></div>
</div>

<script>
const SAMPLES = [
  "Birds sing.",
  "She became a great scientist.",
  "The students finished their homework quickly.",
  "My teacher gave me a wonderful book yesterday.",
  "We found the movie very exciting.",
  "Although he was tired, he continued working because he wanted to finish the project.",
  "The book that she borrowed from the library was written by a famous author who lived in Paris."
];

const textarea = document.getElementById('inputText');
const charCount = document.getElementById('charCount');

textarea.addEventListener('input', () => {
  charCount.textContent = textarea.value.length + '자';
});

function setSample(idx) {
  textarea.value = SAMPLES[idx];
  charCount.textContent = textarea.value.length + '자';
  document.getElementById('results').classList.remove('visible');
  document.getElementById('errorBox').classList.remove('visible');
}

const ROLE_LABELS = {
  S: '주어', V: '동사', O: '목적어', C: '보어', A: '부사어', P: '구/절', none: ''
};

async function analyze() {
  const text = textarea.value.trim();
  if (!text) return;

  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  loading.classList.add('visible');
  results.classList.remove('visible');
  errorBox.classList.remove('visible');
  results.innerHTML = '';

  const prompt = `You are an English grammar analyzer for Korean middle/high school students.

Analyze the following English text and tag each word or phrase with its sentence function.

Use these tags:
- S = Subject (주어)
- V = Verb (동사, including auxiliaries, be verbs)
- O = Object (목적어: direct or indirect)
- C = Complement (보어: subject complement or object complement)
- A = Adverbial (부사어: adverbs, adverbial phrases, prepositional phrases acting as adverbs)
- P = Subordinate clause or important phrase (종속절, 관계절, to부정사구, 분사구 등)
- none = punctuation, conjunctions, articles, particles that don't fit above

Input text:
"""
${text}
"""

Respond ONLY with a valid JSON array. No explanations, no markdown, no extra text.

Format:
[
  {
    "sentence": "original sentence string",
    "pattern": "문형 (예: SV, SVC, SVO, SVOO, SVOC)",
    "patternKo": "문형 설명 (예: 1형식 주어+동사)",
    "tokens": [
      {"word": "word or phrase", "role": "S|V|O|C|A|P|none", "ko": "한국어 역할 설명 (role이 none이면 빈 문자열)"}
    ],
    "breakdown": [
      {"role": "S|V|O|C|A|P", "phrase": "phrase text", "ko": "역할 설명 (예: 주어, 동사구, 직접목적어 등)"}
    ]
  }
]

Rules:
- Split the input into individual sentences
- Group multi-word subjects, verb phrases, objects, etc. as single tokens when natural
- For complex sentences, tag main clause parts with S/V/O/C/A and subordinate clauses with P
- Keep punctuation as "none" role
- The "breakdown" array should list only the main functional parts (not every word)`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const raw = data.content.map(b => b.text || '').join('');

    // JSON 파싱
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderResults(parsed);

  } catch (err) {
    console.error(err);
    errorBox.textContent = '분석 중 오류가 발생했습니다. 문장을 확인하고 다시 시도해주세요. (' + err.message + ')';
    errorBox.classList.add('visible');
  } finally {
    btn.disabled = false;
    loading.classList.remove('visible');
  }
}

function renderResults(sentences) {
  const results = document.getElementById('results');
  results.innerHTML = '';

  sentences.forEach((sent, idx) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = (idx * 0.07) + 's';

    // 태깅된 문장 HTML 생성
    const taggedHTML = sent.tokens.map(tok => {
      if (tok.role === 'none') {
        return `<span class="token-word none">${escapeHTML(tok.word)}</span>`;
      }
      return `<span class="token" style="position:relative;display:inline-block;margin-top:20px">
        <span class="token-label ${tok.role}">${tok.role} ${ROLE_LABELS[tok.role] || ''}</span>
        <span class="token-word ${tok.role}" title="${escapeHTML(tok.ko || '')}">${escapeHTML(tok.word)}</span>
      </span>`;
    }).join(' ');

    // 분석표 HTML
    const breakdownHTML = (sent.breakdown || []).map(b => `
      <div class="breakdown-item ${b.role}">
        <span class="breakdown-role">${b.role}</span>
        <span class="breakdown-phrase">${escapeHTML(b.phrase)}</span>
        <span class="breakdown-ko">${escapeHTML(b.ko || '')}</span>
      </div>
    `).join('');

    card.innerHTML = `
      <div class="result-header">
        <span class="sentence-num">SENTENCE ${idx + 1}</span>
        <span class="sentence-pattern">${escapeHTML(sent.pattern || '')} · ${escapeHTML(sent.patternKo || '')}</span>
      </div>
      <div class="tagged-sentence">${taggedHTML}</div>
      ${breakdownHTML ? `
        <div class="breakdown">
          <div class="breakdown-title">Component Breakdown</div>
          <div class="breakdown-grid">${breakdownHTML}</div>
        </div>
      ` : ''}
    `;

    results.appendChild(card);
  });

  results.classList.add('visible');
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// 초기 예문 설정
setSample(2);
</script>
